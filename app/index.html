<a class="skip-link" href="#main" data-i18n="a11y.skip">Skip to main content</a>

<header class="app-header">
  <span class="brand">
    <svg width="24" height="24" aria-hidden="true"><use href="#i-wave"/></svg>
    <span data-i18n="app.name">Harlem FloodEscape</span>
  </span>
  <button id="lang-toggle" class="btn btn-quiet" type="button" data-i18n-aria-label="lang.toggleAria">
    <span id="lang-toggle-label">ES</span>
  </button>
  <button id="theme-toggle" class="btn btn-quiet" type="button" data-i18n-aria-label="theme.toggleAria">
    <svg width="20" height="20" aria-hidden="true"><use href="#i-eye"/></svg>
    <span data-i18n="theme.toggle">Theme</span>
  </button>
  <button id="about-open" class="btn btn-quiet" type="button">
    <span data-i18n="about.open">About</span>
  </button>
</header>

<div id="watermark" class="watermark" hidden>
  <svg width="18" height="18" aria-hidden="true"><use href="#i-warn"/></svg>
  <span id="watermark-text"></span>
  <span id="scen-time" class="scen-time"></span>
  <div class="transport">
    <button id="scen-playpause" class="btn" type="button" data-i18n-aria-label="demo.play">
      <svg width="16" height="16" aria-hidden="true"><use href="#i-play"/></svg>
    </button>
    <label class="visually-hidden" for="scen-speed" data-i18n="demo.speed">Speed</label>
    <select id="scen-speed">
      <option value="1">1×</option>
      <option value="10">10×</option>
      <option value="60" selected>60×</option>
      <option value="300">300×</option>
    </select>
    <label class="visually-hidden" for="scen-scrub" data-i18n="demo.scrub">Scenario timeline</label>
    <input id="scen-scrub" type="range" min="0" max="1000" value="0" step="1">
    <button id="scen-exit" class="btn" type="button">
      <svg width="14" height="14" aria-hidden="true"><use href="#i-x"/></svg>
      <span data-i18n="demo.exit">Exit replay</span>
    </button>
  </div>
</div>

<main id="main">
  <section id="view-home" class="view" aria-labelledby="home-h1">
    <h1 id="home-h1" data-i18n="home.title" tabindex="-1">Flood status</h1>
    <div id="status-card-mount"></div>
    <div id="context-mount" class="context-grid"></div>
    <div id="home-action-mount"></div>
    <div id="home-demo-mount"></div>
  </section>

  <section id="view-map" class="view view-map" aria-labelledby="map-h1" hidden>
    <h1 id="map-h1" class="visually-hidden" data-i18n="map.title" tabindex="-1">Map</h1>
    <div class="map-wrap">
      <div id="leaflet-map"></div>
    </div>
    <div id="map-panel-mount" class="map-panel"></div>
  </section>

  <section id="view-report" class="view" aria-labelledby="report-h1" hidden>
    <h1 id="report-h1" data-i18n="report.title" tabindex="-1">Report flooding</h1>
    <div id="report-mount"></div>
  </section>

  <section id="view-plan" class="view" aria-labelledby="plan-h1" hidden>
    <h1 id="plan-h1" data-i18n="plan.title" tabindex="-1">My Plan</h1>
    <div id="plan-mount"></div>
    <footer class="app-footer">
      <span data-i18n="footer.line">Research prototype · CUNY Graduate Center · NOAA CESSRST-II #NA22SEC4810016 · In an emergency call 911</span>
    </footer>
  </section>
</main>

<nav class="tabbar" data-i18n-aria-label="a11y.mainNav">
  <a href="#/home" id="tab-home" aria-current="page">
    <svg width="22" height="22" aria-hidden="true"><use href="#i-home"/></svg>
    <span data-i18n="nav.home">Home</span>
  </a>
  <a href="#/map" id="tab-map">
    <svg width="22" height="22" aria-hidden="true"><use href="#i-map"/></svg>
    <span data-i18n="nav.map">Map</span>
  </a>
  <a href="#/report" id="tab-report">
    <svg width="22" height="22" aria-hidden="true"><use href="#i-report"/></svg>
    <span data-i18n="nav.report">Report</span>
  </a>
  <a href="#/plan" id="tab-plan">
    <svg width="22" height="22" aria-hidden="true"><use href="#i-bag"/></svg>
    <span data-i18n="nav.plan">My Plan</span>
  </a>
</nav>

<dialog id="firstrun-dialog" aria-labelledby="firstrun-title">
  <div class="dialog-head">
    <svg width="22" height="22" aria-hidden="true"><use href="#i-warn"/></svg>
    <h2 id="firstrun-title" data-i18n="firstrun.title">Welcome to Harlem FloodEscape</h2>
  </div>
  <p data-i18n="firstrun.body"></p>
  <button id="firstrun-accept" class="btn btn-primary btn-block" type="button" data-i18n="firstrun.accept">I understand</button>
</dialog>

<dialog id="about-dialog" aria-labelledby="about-title">
  <div class="dialog-head">
    <h2 id="about-title" data-i18n="about.title">About this app</h2>
    <button class="btn btn-quiet dialog-close" type="button" data-i18n-aria-label="a11y.closeDialog">
      <svg width="16" height="16" aria-hidden="true"><use href="#i-x"/></svg>
    </button>
  </div>
  <p><strong data-i18n="about.prototype"></strong></p>
  <p data-i18n="about.purpose"></p>
  <p data-i18n="about.privacy"></p>
  <p data-i18n="about.attribution"></p>
  <p data-i18n="about.credits"></p>
</dialog>

<dialog id="demo-dialog" aria-labelledby="demo-title">
  <div class="dialog-head">
    <h2 id="demo-title" data-i18n="demo.title">Demo scenarios</h2>
    <button class="btn btn-quiet dialog-close" type="button" data-i18n-aria-label="a11y.closeDialog">
      <svg width="16" height="16" aria-hidden="true"><use href="#i-x"/></svg>
    </button>
  </div>
  <p data-i18n="demo.intro"></p>
  <div id="scenario-options"></div>
</dialog>

<dialog id="confirm-dialog" aria-labelledby="confirm-title">
  <div class="dialog-head">
    <h2 id="confirm-title"></h2>
  </div>
  <p id="confirm-body"></p>
  <div class="btn-row">
    <button id="confirm-yes" class="btn btn-danger" type="button" data-i18n="common.confirm">Confirm</button>
    <button id="confirm-no" class="btn" type="button" data-i18n="common.cancel">Cancel</button>
  </div>
</dialog>

<div class="toast-region" id="toast-region"></div>
<div aria-live="assertive" class="visually-hidden" id="live-assertive" data-i18n-aria-label="a11y.statusLive"></div>
<div aria-live="polite" class="visually-hidden" id="live-polite" data-i18n-aria-label="a11y.updatesLive"></div>

<script src="vendor/leaflet/leaflet.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
